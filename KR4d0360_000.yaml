body:
  text: 孝詩别集類三宋提要臣等謹案孝詩一卷宋林同撰同字子真號空齋福清人祖瑑直寶章閣父公遇字養正蔭補寧化尉以不忍違親乞奉祠服闋調户曺不就自營精舍以居扁曰寒齋同其長子也與弟合字子常俱有隱操後元兵至福州抗節死之林希逸鬳齋續集中與其兄弟贈答詩文甚多又有同所作壬申酬倡集跋今其書已佚惟此集猶傳前有淳祐庚戌劉克莊序皆托古今孝事每事為一五言絶句一首亦間有兩事合詠為一者其變例也凡聖人之孝十首賢者之孝二百四十首仙佛之孝十首異域之孝十首物類之孝十首其間如唐李迥秀之類本為佞幸蓋以一節取之至寒山子煮爺煮娘之類則愛無差等之談録之不免於駁雜然大旨主於敦飭人倫感發天性未可以其詞旨陳腐棄之况其人始以孝著終以忠聞雖零篇斷什猶當珍而惜之是固不僅以文章論矣案宋史忠義傳稱林空齋失其名已為失考又誤以空齋為同之子分一人為二人併云空齋舉進士歷知縣考克莊序謂同兄弟俱未脫白又嘗曰年未四十慨然罷舉是同固未嘗舉進士也又宋人劉麟瑞昭忠逸詠稱林處士同是同固未嘗任知縣也且麟瑞詩內有血書矮壁存吾節氣貫長虹任汝烹句又與史之嚙指血書壁自誓不屈諸語相合然則死節者為同而非同之子也明甚宋史殊為失實又福建通志人物傳稱林同字子真公遇子元兵至不屈死隱逸傳又稱林同字子貞與弟合並有隱操至元中郡府上其行誼詔徴不就合字子常云云其説又異然同合之俱為公遇子已見原序同字子真合字子常已見鬳齋集俱確鑿可信通志既以死難之林同為公遇子則隱逸之林同不得又曰弟合字子常也且改同為同改子真為子貞並屬點畫音聲之變明為傳寫訛謬分為二人至曺溶學海類編亦載孝詩一卷題長樂林同季野著名同而地與字俱異又不知其何所據矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀孝詩原序寒齋力辭聘召死於隱約子同合以表其阡旌其閭為未足也行其書焉嗣其學焉同又托載籍以來孝於父母者事為一詩詩具一意各二韻二十字積至三百首起邃古迄叔季兼取明天理未嘗泯也自聖賢至異域異類並録見天性未嘗異也事陳而意新辭約而義溥賢於煙雲月露之作逺矣始寒齋之事寶章也視調膳裼襲之節以康其體躬場圃井臼之勞以裕其力人知寶章之勇退而不知其退之有以自樂也同合之事寒齋也亦然昔曾元養參矣不如參之養晳石奮諸子恬侯稍不逮建至孫而孝謹遂衰今石塘之林奕世家法嗣守不墜有古人所難能者惜其弟兄俱未脫白修於家浮沉於閭里而已余嘗恨世儒率華過其實惟同華實相副其操行蓋漢孝亷之盛舉也詞藝亦唐進士之髙選也頃艮齋謝公嘗彚孝史五十卷上之阜陵同此詩他日必與謝公之史並行淳祐庚戌白露節前史官劉克莊序
